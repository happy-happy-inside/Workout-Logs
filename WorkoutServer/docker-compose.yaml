

services:
  server:
    build: 
      context: .
    ports:
      - "50051:50051"
    networks:
      - app-network
    environment:
      DB_USER: aaa
      DB_PASSWORD: hihi
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: todo
    depends_on:
      - database
  database:
    image: postgres:15
    environment:
     POSTGRES_USER: aaa
     POSTGRES_PASSWORD: hihi
     POSTGRES_DB: todo
     
    ports:
       - "5432:5432"
    networks:
       - app-network

networks:
  app-network:
    driver: bridge