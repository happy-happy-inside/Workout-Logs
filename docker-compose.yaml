version: "3.9"

services:
  bot:
    build:
      context: ./WorkoutBot/bot
      dockerfile: Dockerfile
    container_name: bot
    networks:
      - app-network
    environment:
      TELEGRAM_TOKEN: 8323906750:AAEg2xVPwz17GcFJmvPMdCPhygCb17S0Elo
      SERVER_HOST: "server:50051"
      KAFKA_BROKERS: "kafka:9092"
    restart: always
    depends_on:
      - server
  ai:
    build:
      context: ./WorkoutAIStat
      dockerfile: Dockerfile
    ports:
      - 50000:50051
    container_name: ai
    networks:
      - app-network
    environment:
      KAFKA_BROKERS: "kafka:9092"
      AI_API_KEY: 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
  web:
    build:
      context: ./Web
      dockerfile: Dockerfile
    ports:
      - "8080:8080" 
    container_name: web
    networks:
      - app-network
    environment:
      CLIENT_ADDR: "server:50051"
  server:
    build: 
      context: ./WorkoutServer
      dockerfile: Dockerfile
    container_name: server
    ports:
      - "50051:50051"
    networks:
      - app-network
    environment:
      DB_USER: Work
      DB_PASSWORD: 27112007_gg
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: workout
      REDIS: "redis:6379"
    depends_on:
      - database
      - redis
    restart: always

  database:
    image: postgres:15
    environment:
      POSTGRES_USER: Work
      POSTGRES_PASSWORD: 27112007_gg
      POSTGRES_DB: workout
    ports:
       - "5432:5432"
    networks:
       - app-network
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    networks:
     - app-network
    ports:
     - "9092:9092"
    environment:
      KAFKA_LOG4J_ROOT_LOGLEVEL: "ERROR"
      KAFKA_LOG4J_LOGGERS: "kafka=ERROR,kafka.controller=ERROR,kafka.log.LogCleaner=ERROR,state.change.logger=ERROR"
      KAFKA_LOG4J_TOOLS_LOGLEVEL: "ERROR"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - 6379:6379
    restart: always 
    networks:
      - app-network

networks:
  app-network:
    driver: bridge